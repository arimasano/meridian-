<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERIDIAN — Dossier AK-2134</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Crimson+Text:ital@0;1&display=swap');

:root {
  --green: #00ff41;
  --green-dim: #00aa2a;
  --green-dark: #003310;
  --green-faint: #001a08;
  --red: #ff3333;
  --amber: #ffaa00;
  --white: #e8e8e8;
  --bg: #010801;
  --corrupt: #ff2222;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 17px;
  line-height: 1.7;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: none;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 4px);
  pointer-events:none; z-index:200;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background: radial-gradient(ellipse at center, transparent 70%, rgba(0,0,0,0.4) 100%);
  pointer-events:none; z-index:199;
}

#cursor {
  position:fixed; width:10px; height:10px;
  border:1px solid var(--green);
  pointer-events:none; z-index:999;
  transform:translate(-50%,-50%);
}
#cursor::after {
  content:''; position:absolute; inset:2px;
  background:var(--green); opacity:0.6;
}

/* MENU */
#menu {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:48px; z-index:300; background:var(--bg);
}

#menu-title .m-main {
  font-family:'VT323',monospace; font-size:82px;
  color:var(--green); letter-spacing:0.3em;
  display:block; position:relative;
  animation: title-glitch 3s infinite;
}
#menu-title .m-main::before,
#menu-title .m-main::after {
  content:'MERIDIAN'; position:absolute; top:0; left:0;
  width:100%; letter-spacing:0.3em;
}
#menu-title .m-main::before {
  color:#ff2222; animation:glitch-before 3s infinite;
  clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);
}
#menu-title .m-main::after {
  color:#00aaff; animation:glitch-after 3s infinite;
  clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);
}
@keyframes title-glitch {
  0%,89%,100%{opacity:1;transform:none;filter:none}
  90%{transform:translateX(-2px) skewX(-1deg);filter:brightness(1.3)}
  91%{opacity:0.6;transform:translateX(3px);filter:hue-rotate(90deg)}
  92%{opacity:1;transform:translateX(-1px) skewX(2deg)}
  93%{opacity:0.4;transform:translateX(4px);filter:hue-rotate(180deg) brightness(1.5)}
  94%{opacity:1;transform:none;filter:none}
  95%{transform:translateX(-3px) scaleY(1.02);filter:brightness(1.2)}
  96%{opacity:0.8;transform:translateX(2px)}
  97%{opacity:1;transform:none;filter:none}
  98%{opacity:0.3;transform:translateX(-4px) skewX(-3deg);filter:hue-rotate(270deg)}
  99%{opacity:1;transform:translateX(1px);filter:none}
}
@keyframes glitch-before {
  0%,89%,100%{opacity:0;transform:none}
  90%{opacity:0.8;transform:translateX(-4px)}
  91%{opacity:0}
  93%{opacity:0.6;transform:translateX(5px)}
  94%,97%{opacity:0}
  98%{opacity:0.7;transform:translateX(-3px)}
  99%{opacity:0}
}
@keyframes glitch-after {
  0%,89%,100%{opacity:0;transform:none}
  91%{opacity:0.7;transform:translateX(4px)}
  92%,95%{opacity:0}
  96%{opacity:0.6;transform:translateX(-5px)}
  97%{opacity:0}
  98%{opacity:0.5;transform:translateX(3px)}
  99%{opacity:0}
}
#menu-title .m-sub {
  font-size:13px; color:var(--green-dim);
  letter-spacing:0.25em; display:block; margin-top:8px; text-align:center;
}
#menu-title .m-dossier {
  font-size:12px; color:#005510;
  letter-spacing:0.2em; display:block; margin-top:4px; text-align:center;
}
#btn-play {
  background:transparent; border:1px solid var(--green-dim);
  color:var(--green); font-family:'Share Tech Mono',monospace;
  font-size:15px; letter-spacing:0.3em;
  padding:13px 52px; cursor:none;
  transition:border-color 0.2s,background 0.2s;
}
#btn-play:hover{border-color:var(--green);background:var(--green-faint);}
.menu-loop{font-size:11px;color:#003310;letter-spacing:0.15em;}

/* INTRO */
#intro-screen {
  position:fixed; inset:0; background:var(--bg); z-index:301;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:80px; gap:36px;
}
#intro-text{font-size:16px;color:var(--green);line-height:2.3;letter-spacing:0.05em;max-width:620px;text-align:left;}
#btn-intro-continue {
  display:none; background:transparent;
  border:1px solid var(--green-dark); color:var(--green-dim);
  font-family:'Share Tech Mono',monospace; font-size:14px;
  letter-spacing:0.25em; padding:11px 38px; cursor:none;
  transition:border-color 0.2s,color 0.2s;
}
#btn-intro-continue:hover{border-color:var(--green);color:var(--green);}

/* HEADER */
#header {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 18px; border-bottom:1px solid var(--green-dark);
  font-size:13px; color:var(--green-dim);
  flex-shrink:0; letter-spacing:0.08em; position:relative; z-index:10;
}
#header .h-agent{color:var(--green);}
#loop-counter{color:var(--green-dim);font-size:13px;}
#loop-counter.blink-loop{animation:blink 0.8s step-end infinite;}

/* TERMINAL */
#terminal {
  flex:1; overflow-y:auto; padding:16px 22px 8px;
  display:flex; flex-direction:column; gap:1px;
  scrollbar-width:thin; scrollbar-color:var(--green-dark) transparent;
}
#terminal::-webkit-scrollbar{width:3px;}
#terminal::-webkit-scrollbar-thumb{background:var(--green-dark);}

.line{animation:fadein 0.04s ease;}
@keyframes fadein{from{opacity:0}to{opacity:1}}

.l-sys  {color:var(--green-dim);font-size:15px;}
.l-resp {color:var(--green);}
.l-cmd  {color:var(--green);}
.l-cmd::before{content:'Marven@MERIDIAN:~$ ';color:var(--green-dim);}
.l-warn {color:var(--amber);}
.l-err  {color:var(--red);}
.l-corrupt{color:var(--corrupt);font-family:'VT323',monospace;font-size:20px;}
.l-blank{height:6px;}
.l-sep  {color:var(--green-dark);font-size:15px;}
.l-dim  {color:#005510;font-size:15px;}
.hl{background:var(--green-dark);color:var(--green);padding:0 2px;}
.redacted{background:var(--green-dim);color:var(--green-dim);padding:0 1px;user-select:none;}

/* COMMANDES */
#commands-bar {
  border-top:1px solid var(--green-dark);
  padding:9px 20px; display:flex; flex-wrap:wrap;
  gap:7px; flex-shrink:0; min-height:46px; align-items:center;
}
.cmd-btn {
  background:transparent; border:1px solid var(--green-dark);
  color:var(--green-dim); font-family:'Share Tech Mono',monospace;
  font-size:13px; letter-spacing:0.1em;
  padding:5px 13px; cursor:none;
  transition:border-color 0.15s,color 0.15s,background 0.15s;
}
.cmd-btn.unlocked{border-color:var(--green-dim);color:var(--green);}
.cmd-btn:hover:not(:disabled){border-color:var(--green-dim);color:var(--green);background:var(--green-faint);}
.cmd-btn:disabled{opacity:0.2;pointer-events:none;}
.cmd-btn.key-step{animation:pulse-key 2.5s ease infinite;}
@keyframes pulse-key {
  0%,100%{border-color:var(--green-dim);box-shadow:none;color:var(--green);}
  50%{border-color:var(--green);box-shadow:0 0 7px rgba(0,255,65,0.35);color:var(--green);}
}

/* FLASHBACK */
#flashback-overlay {
  position:fixed; inset:0; background:#000; z-index:400;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:80px; gap:40px;
}
#flashback-overlay.active{display:flex;}
#flashback-text {
  font-family:'Crimson Text',Georgia,serif;
  font-size:24px; font-style:italic; color:#ffffff;
  text-align:center; line-height:2.1; max-width:560px;
  opacity:0; transition:opacity 1.2s ease;
}
#flashback-text.visible{opacity:1;}
#flashback-hint {
  font-family:'Share Tech Mono',monospace;
  font-size:11px; color:#333; letter-spacing:0.25em;
  opacity:0; transition:opacity 1s ease;
}
#flashback-hint.visible{opacity:1;animation:blink-hint 2s ease infinite;}
@keyframes blink-hint{0%,100%{opacity:0.35}50%{opacity:0.9}}

/* FIN */
#end-overlay {
  position:fixed; inset:0; background:#000; z-index:500;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:60px; gap:0;
}
#end-overlay.active{display:flex;}
#end-question {
  font-family:'Share Tech Mono',monospace; font-size:22px;
  color:var(--white); text-align:center; letter-spacing:0.1em;
  opacity:0; transition:opacity 1s ease; margin-bottom:36px;
}
#end-question.visible{opacity:1;}
#end-choices{display:flex;gap:24px;opacity:0;transition:opacity 0.8s ease;}
#end-choices.visible{opacity:1;}
.end-btn {
  background:transparent; border:1px solid #333; color:#666;
  font-family:'Share Tech Mono',monospace; font-size:15px;
  letter-spacing:0.2em; padding:10px 32px; cursor:none;
  transition:border-color 0.2s,color 0.2s;
}
.end-btn:hover{border-color:#888;color:var(--white);}
#end-message {
  font-family:'Crimson Text',Georgia,serif;
  font-size:23px; font-style:italic; color:var(--white);
  text-align:center; letter-spacing:0.04em; line-height:2.2;
  opacity:0; transition:opacity 1.5s ease;
  margin-top:44px; max-width:580px;
}
#end-message.visible{opacity:1;}
#end-final {
  font-family:'Share Tech Mono',monospace; font-size:13px;
  color:#444; text-align:center; letter-spacing:0.2em;
  line-height:2.6; opacity:0; transition:opacity 2s ease; margin-top:52px;
}
#end-final.visible{opacity:1;}

/* BRÈCHE */
#breach-canvas{position:fixed;inset:0;z-index:600;display:none;background:#000;}
#breach-canvas.active{display:block;}

/* GLOBAL */
.glitch-body{animation:glitch-frame 0.15s ease;}
@keyframes glitch-frame {
  0%{transform:translateX(0) skewX(0)}
  20%{transform:translateX(-4px) skewX(-1deg)}
  40%{transform:translateX(4px) skewX(1deg)}
  60%{transform:translateX(-2px)}
  80%{transform:translateX(2px)}
  100%{transform:translateX(0) skewX(0)}
}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>

<div id="cursor"></div>

<div id="menu">
  <div id="menu-title">
    <span class="m-main">MERIDIAN</span>
    <span class="m-sub">SYSTÈME JUDICIAIRE FÉDÉRAL — v7.1.0</span>
    <span class="m-dossier">Dossier AK-2134 — Disparition non résolue</span>
  </div>
  <button id="btn-play">[ Jouer ]</button>
  <span class="menu-loop">boucle : 4 847</span>
</div>

<div id="intro-screen">
  <div style="max-width:620px;text-align:left;">
    <div style="font-size:11px;color:var(--green-dim);letter-spacing:0.25em;margin-bottom:24px;">— NOTE DE BRIEFING —</div>
    <div id="intro-text"></div>
  </div>
  <button id="btn-intro-continue">[ Accéder au terminal ]</button>
</div>

<div id="header" style="display:none">
  <span>MERIDIAN OS v7.1.0 — SYSTÈME JUDICIAIRE FÉDÉRAL</span>
  <span>Agent : <span class="h-agent">Kael Marven</span> — Niveau 4</span>
  <span id="loop-counter">boucle : 4 847</span>
</div>

<div id="terminal" style="display:none"></div>
<div id="commands-bar" style="display:none"></div>

<div id="flashback-overlay">
  <div id="flashback-text"></div>
  <div id="flashback-hint">— appuyez sur espace pour continuer —</div>
</div>

<div id="end-overlay">
  <div id="end-question"></div>
  <div id="end-choices">
    <button class="end-btn" id="btn-oui">[ OUI ]</button>
    <button class="end-btn" id="btn-non">[ NON ]</button>
    <button class="end-btn" id="btn-silence">[ ... ]</button>
  </div>
  <div id="end-message"></div>
  <div id="end-final"></div>
</div>

<canvas id="breach-canvas"></canvas>

<script>
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

const sleep = ms => new Promise(r => setTimeout(r, ms));
const T  = document.getElementById('terminal');
const CB = document.getElementById('commands-bar');

let act = 0;
let busy = false;
let unlockedIndex = 0;
let hintTimer = null;
let dynamicCommands = [];

function addLine(text, cls='l-resp', delay=0) {
  return new Promise(async resolve => {
    if (delay) await sleep(delay);
    const d = document.createElement('div');
    d.className = 'line ' + cls;
    d.innerHTML = text;
    T.appendChild(d);
    T.scrollTop = T.scrollHeight;
    resolve();
  });
}
function blank(d=0){ return addLine('','l-blank',d); }
async function lines(arr, base=50) {
  for (let i=0;i<arr.length;i++) {
    const [t,c='l-resp'] = arr[i];
    await addLine(t, c, i===0 ? 0 : base+Math.random()*30);
  }
}
async function glitch(ms=200) {
  document.body.classList.add('glitch-body');
  await sleep(ms);
  document.body.classList.remove('glitch-body');
}

// Ordre séquentiel des commandes de base
const BASE_CMDS = [
  ['DOSSIER',               () => cmdDossier()],
  ['PROFIL',                () => cmdProfil()],
  ['LOGS',                  () => cmdLogs()],
  ['TIMELINE',              () => cmdTimeline()],
  ['PREUVES',               () => cmdPreuves()],
  ['DOSSIER LIÉ : MV-2134', () => cmdMV2134()],
  ['RAPPORT MÉDICAL',       () => cmdRapport()],
];

function buildCommands() {
  CB.innerHTML = '';
  const all = [...BASE_CMDS, ...dynamicCommands];
  all.forEach(([label, fn], idx) => {
    const isBase   = idx < BASE_CMDS.length;
    const unlocked = isBase ? idx <= unlockedIndex : true;
    const b = document.createElement('button');
    b.className = 'cmd-btn' + (unlocked ? ' unlocked' : '');
    b.textContent = label;
    b.disabled = !unlocked;
    if (unlocked) {
      b.addEventListener('click', async () => {
        if (busy) return;
        busy = true;
        if (hintTimer) clearTimeout(hintTimer);
        CB.querySelectorAll('.cmd-btn').forEach(x => x.classList.remove('key-step'));
        disableAll();
        await addLine(label, 'l-cmd');
        await blank();
        await fn();
        await blank();
        busy = false;
        buildCommands();
        scheduleHint();
      });
    }
    CB.appendChild(b);
  });
}

function disableAll() {
  CB.querySelectorAll('.cmd-btn').forEach(b => b.disabled = true);
}

function unlockNext() {
  if (unlockedIndex < BASE_CMDS.length - 1) unlockedIndex++;
  buildCommands();
  scheduleHint();
}

function scheduleHint() {
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(async () => {
    if (busy) return;
    // Trouver la prochaine commande non encore cliquée
    let nextLabel = null;
    if (unlockedIndex < BASE_CMDS.length - 1) {
      nextLabel = BASE_CMDS[unlockedIndex + 1]?.[0];
    } else {
      const dyn = dynamicCommands.find(([label]) => {
        const btn = [...CB.querySelectorAll('.cmd-btn')].find(b => b.textContent.trim() === label && !b.disabled);
        return !!btn;
      });
      if (dyn) nextLabel = dyn[0];
    }
    if (!nextLabel) return;
    await addLine(`// mise à jour dossier — consulter : ${nextLabel}`, 'l-dim');
    await blank();
    T.scrollTop = T.scrollHeight;
    CB.querySelectorAll('.cmd-btn').forEach(b => {
      if (b.textContent.trim() === nextLabel) b.classList.add('key-step');
    });
  }, 20000);
}

// FLASHBACKS
const FLASHBACKS = [
  `Il faisait beau ce jour-là. Je ne sais pas pourquoi<br>je m'en souviens. C'est le jour où Max est arrivé —<br>il grattait à la porte, trempé. Je l'ai laissé entrer.<br>Il s'est installé comme s'il avait toujours été là.`,
  `Ce soir j'ai commandé à manger. Trop pour une personne.<br>Je mange toujours trop pour une personne.<br>Max a dormi sur mes genoux pendant que je finissais<br>de travailler. Journée ordinaire.<br>Les meilleures le sont.`,
  `Il y a des matins où je me réveille et pendant<br>une fraction de seconde je ne sais plus où je suis.<br>Ça dure une seconde, pas plus.<br>Ensuite tout revient — l'appartement, Max, le travail.<br>Tout est là.<br>Tout a toujours été là.`
];

function showFlashback(index) {
  return new Promise(async resolve => {
    const ov   = document.getElementById('flashback-overlay');
    const tx   = document.getElementById('flashback-text');
    const hint = document.getElementById('flashback-hint');
    await glitch(300);
    ov.classList.add('active');
    tx.innerHTML = FLASHBACKS[index];
    hint.classList.remove('visible');
    tx.classList.remove('visible');
    await sleep(300);
    tx.classList.add('visible');
    await sleep(1400);
    hint.classList.add('visible');
    function onKey(e) {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        document.removeEventListener('keydown', onKey);
        close();
      }
    }
    async function close() {
      tx.classList.remove('visible');
      hint.classList.remove('visible');
      await sleep(700);
      ov.classList.remove('active');
      await sleep(300);
      resolve();
    }
    document.addEventListener('keydown', onKey);
  });
}

// COMMANDES
async function cmdDossier() {
  await lines([
    ['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep'],
    ['DOSSIER AK-2134 — DISPARITION NON RÉSOLUE','l-warn'],
    ['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep'],
  ],30);
  await lines([
    ['Sujet       : <span class="hl">KERVEL, Anna</span>','l-resp'],
    ['Âge         : 29 ans','l-resp'],
    ['Profession  : Ingénieure en neurotechnologie — MERIDIAN Corp.','l-resp'],
    ['Domicile    : Apt. 7, Tour Helios, District 4, Nouvelle-Genève','l-resp'],
    ['Disparition : <span id="disp-date">14 avril 2134</span>','l-resp'],
    ['Statut      : Classé sans suite. Rouvert sur demande interne.','l-resp'],
  ],40);
  await blank();
  await addLine('Personne à prévenir : <span style="color:#005510">—</span>','l-resp');
  await addLine('Dossier lié         : <span style="color:#005510">MV-2134 [accès refusé]</span>','l-resp');
  await lines([['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep']],30);
  if (act >= 3) {
    await sleep(500); await glitch(120);
    const d = document.getElementById('disp-date');
    if (d) d.textContent = '17 avril 2134';
  }
  unlockNext();
}

async function cmdProfil() {
  await lines([
    ['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep'],
    ['KERVEL, Anna — Profil opérateur','l-warn'],
    ['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep'],
  ],30);
  await lines([
    ['Employée chez MERIDIAN Corp. depuis 4 ans.','l-resp'],
    ['Spécialité : architecture des systèmes de mémoire distribuée.','l-resp'],
    ['Évaluation : excellente. Aucun incident disciplinaire.','l-resp'],
  ],45);
  await blank();
  await addLine('Dernière présence enregistrée : 14 avril 2134, 23h12.','l-resp',50);
  await addLine('Après cette heure : aucune trace physique, aucun mouvement','l-resp',45);
  await addLine('de compte, aucune connexion réseau.','l-resp',45);
  await blank();
  await addLine('Note interne [auteur : <span class="redacted">████████</span>] :','l-dim',50);
  await addLine('"Elle avait trouvé quelque chose. C\'est tout ce qu\'on sait."','l-dim',45);
  await lines([['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep']],30);
  unlockNext();
}

async function cmdLogs() {
  await lines([
    ['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep'],
    ['LOGS DE CONNEXION — KERVEL, Anna','l-warn'],
    ['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep'],
  ],30);
  const entries = [
    ['[10 avril 2134, 08h44]','Connexion serveur niveau 4. Durée : 2h17.'],
    ['[11 avril 2134, 09h02]','Tentative accès niveau 6. Refusée.'],
    ['[12 avril 2134, 14h31]','Connexion serveur niveau 4. Durée : 3h44.'],
    ['[13 avril 2134, 22h10]','Connexion serveur niveau 4. Durée : 1h02.'],
    ['[14 avril 2134, 23h12]','<span class="hl">Dernière connexion enregistrée.</span>'],
  ];
  for (const [ts,ev] of entries)
    await addLine(`<span style="color:#005510">${ts}</span> — ${ev}`,'l-resp',45);
  if (act >= 3) {
    await blank(); await glitch(200);
    await addLine('<span class="l-err">// données supplémentaires détectées</span>','l-err',60);
    const extra=[
      ['[15 avril 2134, 03h17]','Connexion — opérateur : <span class="redacted">MV-2134</span>'],
      ['[16 avril 2134, 04h02]','Connexion — opérateur : <span class="redacted">MV-2134</span>'],
      ['...','[DONNÉES TRONQUÉES — 847 entrées masquées]'],
    ];
    for (const [ts,ev] of extra)
      await addLine(`<span style="color:#003a12">${ts}</span> — ${ev}`,'l-dim',55);
  }
  await lines([['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep']],30);
  unlockNext();
}

async function cmdTimeline() {

// BRÈCHE
async function startBreach() {
  const canvas = document.getElementById('breach-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.classList.add('active');
  for (let i=0;i<8;i++) { await glitch(80+Math.random()*120); await sleep(60+Math.random()*80); }
  const W=canvas.width, H=canvas.height;
  const souls=[
    {x:W/2-70,y:H/2,vx:-0.4,vy:-0.2,particles:[],hue:180},
    {x:W/2+70,y:H/2,vx: 0.4,vy:-0.2,particles:[],hue:120},
  ];
  souls.forEach(s=>{
    for(let i=0;i<120;i++) s.particles.push({
      x:s.x+(Math.random()-.5)*30, y:s.y+(Math.random()-.5)*30,
      vx:(Math.random()-.5)*0.8, vy:(Math.random()-.5)*0.8,
      life:1, size:Math.random()*3+1,
    });
  });
  let frame=0, maxF=300;
  function draw() {
    if(frame>maxF){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);return;}
    ctx.fillStyle='rgba(0,0,0,0.06)'; ctx.fillRect(0,0,W,H);
    const p=frame/maxF;
    souls.forEach(s=>{
      s.x+=s.vx*(1+p*2); s.y+=s.vy*(1+p*1.5);
      s.particles.forEach(pt=>{
        pt.x+=pt.vx+(pt.x-s.x)*0.001*p; pt.y+=pt.vy+(pt.y-s.y)*0.001*p;
        pt.vx+=(s.x-pt.x)*0.003; pt.vy+=(s.y-pt.y)*0.003;
        pt.vx*=0.98; pt.vy*=0.98;
        pt.life-=0.003*p; if(pt.life<0)pt.life=0;
        const a=pt.life*(1-p*0.7), sz=pt.size*(1-p*0.5);
        ctx.beginPath(); ctx.arc(pt.x,pt.y,Math.max(0.1,sz),0,Math.PI*2);
        ctx.fillStyle=`hsla(${s.hue},80%,70%,${a})`; ctx.fill();
      });
      const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,40*(1-p*0.5));
      g.addColorStop(0,`hsla(${s.hue},80%,90%,${0.15*(1-p)})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(s.x-50,s.y-50,100,100);
    });
    if(p>0.6){
      const m=(p-0.6)/0.4, mx=(souls[0].x+souls[1].x)/2, my=(souls[0].y+souls[1].y)/2;
      const g=ctx.createRadialGradient(mx,my,0,mx,my,80*m);
      g.addColorStop(0,`hsla(150,60%,95%,${m*0.3})`); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(mx-100,my-100,200,200);
    }
    frame++; requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
  await sleep((maxF/60)*1000+1000);
  canvas.style.transition='opacity 3s ease'; canvas.style.opacity='0';
}
