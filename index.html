<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERIDIAN — Dossier AK-2134</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Crimson+Text:ital@0;1&display=swap');

:root {
  --green: #00ff41;
  --green-dim: #00aa2a;
  --green-dark: #003310;
  --green-faint: #001a08;
  --red: #ff3333;
  --amber: #ffaa00;
  --white: #e8e8e8;
  --bg: #010801;
  --corrupt: #ff2222;
}

* { margin:0; padding:0; box-sizing:border-box; cursor:none !important; }

body {
  background: var(--bg);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 17px;
  line-height: 1.7;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 4px);
  pointer-events:none; z-index:200;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background: radial-gradient(ellipse at center, transparent 70%, rgba(0,0,0,0.4) 100%);
  pointer-events:none; z-index:199;
}

#cursor {
  position:fixed; width:10px; height:10px;
  border:1px solid var(--green);
  pointer-events:none; z-index:999;
  transform:translate(-50%,-50%);
}
#cursor::after {
  content:''; position:absolute; inset:2px;
  background:var(--green); opacity:0.6;
}

/* MENU */
#menu {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:48px; z-index:300; background:var(--bg);
}

#menu-title .m-main {
  font-family:'VT323',monospace; font-size:82px;
  color:var(--green); letter-spacing:0.3em;
  display:block; position:relative;
  animation: title-glitch 3s infinite;
}
#menu-title .m-main::before,
#menu-title .m-main::after {
  content:'MERIDIAN'; position:absolute; top:0; left:0;
  width:100%; letter-spacing:0.3em;
}
#menu-title .m-main::before {
  color:#ff2222; animation:glitch-before 3s infinite;
  clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);
}
#menu-title .m-main::after {
  color:#00aaff; animation:glitch-after 3s infinite;
  clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);
}
@keyframes title-glitch {
  0%,89%,100%{opacity:1;transform:none;filter:none}
  90%{transform:translateX(-2px) skewX(-1deg);filter:brightness(1.3)}
  91%{opacity:0.6;transform:translateX(3px);filter:hue-rotate(90deg)}
  92%{opacity:1;transform:translateX(-1px) skewX(2deg)}
  93%{opacity:0.4;transform:translateX(4px);filter:hue-rotate(180deg) brightness(1.5)}
  94%{opacity:1;transform:none;filter:none}
  95%{transform:translateX(-3px) scaleY(1.02);filter:brightness(1.2)}
  96%{opacity:0.8;transform:translateX(2px)}
  97%{opacity:1;transform:none;filter:none}
  98%{opacity:0.3;transform:translateX(-4px) skewX(-3deg);filter:hue-rotate(270deg)}
  99%{opacity:1;transform:translateX(1px);filter:none}
}
@keyframes glitch-before {
  0%,89%,100%{opacity:0;transform:none}
  90%{opacity:0.8;transform:translateX(-4px)}
  91%{opacity:0}
  93%{opacity:0.6;transform:translateX(5px)}
  94%,97%{opacity:0}
  98%{opacity:0.7;transform:translateX(-3px)}
  99%{opacity:0}
}
@keyframes glitch-after {
  0%,89%,100%{opacity:0;transform:none}
  91%{opacity:0.7;transform:translateX(4px)}
  92%,95%{opacity:0}
  96%{opacity:0.6;transform:translateX(-5px)}
  97%{opacity:0}
  98%{opacity:0.5;transform:translateX(3px)}
  99%{opacity:0}
}
#menu-title .m-sub {
  font-size:13px; color:var(--green-dim);
  letter-spacing:0.25em; display:block; margin-top:8px; text-align:center;
}
#menu-title .m-dossier {
  font-size:12px; color:#005510;
  letter-spacing:0.2em; display:block; margin-top:4px; text-align:center;
}
#btn-play {
  background:transparent; border:1px solid var(--green-dim);
  color:var(--green); font-family:'Share Tech Mono',monospace;
  font-size:15px; letter-spacing:0.3em;
  padding:13px 52px; cursor:none !important;
  transition:border-color 0.2s,background 0.2s;
}
#btn-play:hover{border-color:var(--green);background:var(--green-faint);}
.menu-loop{font-size:11px;color:#003310;letter-spacing:0.15em;}

/* INTRO */
#intro-screen {
  position:fixed; inset:0; background:var(--bg); z-index:301;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:80px; gap:36px;
}
#intro-text{font-size:16px;color:var(--green);line-height:2.3;letter-spacing:0.05em;max-width:620px;text-align:left;}
#btn-intro-continue {
  display:none; background:transparent;
  border:1px solid var(--green-dark); color:var(--green-dim);
  font-family:'Share Tech Mono',monospace; font-size:14px;
  letter-spacing:0.25em; padding:11px 38px; cursor:none !important;
  transition:border-color 0.2s,color 0.2s;
}
#btn-intro-continue:hover{border-color:var(--green);color:var(--green);}

/* HEADER */
#header {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 18px; border-bottom:1px solid var(--green-dark);
  font-size:13px; color:var(--green-dim);
  flex-shrink:0; letter-spacing:0.08em; position:relative; z-index:10;
}
#header .h-agent{color:var(--green);}
#loop-counter{color:var(--green-dim);font-size:13px;}
#loop-counter.blink-loop{animation:blink 0.8s step-end infinite;}

/* TERMINAL */
#terminal {
  flex:1; overflow-y:auto; padding:16px 22px 8px;
  display:flex; flex-direction:column; gap:1px;
  scrollbar-width:thin; scrollbar-color:var(--green-dark) transparent;
}
#terminal::-webkit-scrollbar{width:3px;}
#terminal::-webkit-scrollbar-thumb{background:var(--green-dark);}

.line{animation:fadein 0.04s ease;}
@keyframes fadein{from{opacity:0}to{opacity:1}}

.l-sys  {color:var(--green-dim);font-size:15px;}
.l-resp {color:var(--green);}
.l-cmd  {color:var(--green);}
.l-cmd::before{content:'Marven@MERIDIAN:~$ ';color:var(--green-dim);}
.l-warn {color:var(--amber);}
.l-err  {color:var(--red);}
.l-corrupt{color:var(--corrupt);font-family:'VT323',monospace;font-size:20px;}
.l-blank{height:6px;}
.l-sep  {color:var(--green-dark);font-size:15px;}
.l-dim  {color:#005510;font-size:15px;}
.hl{background:var(--green-dark);color:var(--green);padding:0 2px;}
.redacted{background:var(--green-dim);color:var(--green-dim);padding:0 1px;user-select:none;}

/* COMMANDES */
#commands-bar {
  border-top:1px solid var(--green-dark);
  padding:9px 20px; display:flex; flex-wrap:wrap;
  gap:7px; flex-shrink:0; min-height:46px; align-items:center;
}
.cmd-btn {
  background:transparent; border:1px solid var(--green-dark);
  color:var(--green-dim); font-family:'Share Tech Mono',monospace;
  font-size:13px; letter-spacing:0.1em;
  padding:5px 13px; cursor:none !important;
  transition:border-color 0.15s,color 0.15s,background 0.15s;
}
.cmd-btn.unlocked{border-color:var(--green-dim);color:var(--green);}
.cmd-btn:hover:not(:disabled){border-color:var(--green-dim);color:var(--green);background:var(--green-faint);}
.cmd-btn:disabled{opacity:0.2;pointer-events:none;}
.cmd-btn.key-step{animation:pulse-key 2.5s ease infinite;}
@keyframes pulse-key {
  0%,100%{border-color:var(--green-dim);box-shadow:none;color:var(--green);}
  50%{border-color:var(--green);box-shadow:0 0 7px rgba(0,255,65,0.35);color:var(--green);}
}

/* FLASHBACK */
#flashback-overlay {
  position:fixed; inset:0; background:#000; z-index:400;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:80px; gap:40px;
}
#flashback-overlay.active{display:flex;}
#flashback-text {
  font-family:'Crimson Text',Georgia,serif;
  font-size:24px; font-style:italic; color:#ffffff;
  text-align:center; line-height:2.1; max-width:560px;
  opacity:0; transition:opacity 1.2s ease;
}
#flashback-text.visible{opacity:1;}
#flashback-hint {
  font-family:'Share Tech Mono',monospace;
  font-size:11px; color:#333; letter-spacing:0.25em;
  opacity:0; transition:opacity 1s ease;
}
#flashback-hint.visible{opacity:1;animation:blink-hint 2s ease infinite;}
@keyframes blink-hint{0%,100%{opacity:0.35}50%{opacity:0.9}}

/* FIN */
#end-overlay {
  position:fixed; inset:0; background:#000; z-index:500;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:60px; gap:0;
}
#end-overlay.active{display:flex;}
#end-question {
  font-family:'Share Tech Mono',monospace; font-size:22px;
  color:var(--white); text-align:center; letter-spacing:0.1em;
  opacity:0; transition:opacity 1s ease; margin-bottom:36px;
}
#end-question.visible{opacity:1;}
#end-choices{display:flex;gap:24px;opacity:0;transition:opacity 0.8s ease;}
#end-choices.visible{opacity:1;}
.end-btn {
  background:transparent; border:1px solid #333; color:#666;
  font-family:'Share Tech Mono',monospace; font-size:15px;
  letter-spacing:0.2em; padding:10px 32px; cursor:none !important;
  transition:border-color 0.2s,color 0.2s;
}
.end-btn:hover{border-color:#888;color:var(--white);}
#end-message {
  font-family:'Crimson Text',Georgia,serif;
  font-size:23px; font-style:italic; color:var(--white);
  text-align:center; letter-spacing:0.04em; line-height:2.2;
  opacity:0; transition:opacity 1.5s ease;
  margin-top:44px; max-width:580px;
}
#end-message.visible{opacity:1;}

#anna-dialogue {
  display:flex; flex-direction:column; gap:14px;
  max-width:560px; width:100%; margin-top:8px;
}
.anna-line {
  font-family:'Share Tech Mono',monospace;
  font-size:17px; color:var(--white);
  letter-spacing:0.04em; line-height:1.6;
  opacity:0; transition:opacity 1s ease;
  text-align:left;
}
.anna-line.visible{opacity:1;}
.anna-line .anna-sender { color:#555; margin-right:8px; }
.anna-line.reveal-name .anna-sender { color:var(--green-dim); }
.anna-line.last-line .anna-sender { color:var(--amber); }
#end-final {
  font-family:'Share Tech Mono',monospace; font-size:13px;
  color:#444; text-align:center; letter-spacing:0.2em;
  line-height:2.6; opacity:0; transition:opacity 2s ease; margin-top:52px;
}
#end-final.visible{opacity:1;}

/* BRÈCHE */
#breach-canvas{position:fixed;inset:0;z-index:600;display:none;background:#000;}
#breach-canvas.active{display:block;}

/* GLOBAL */
.glitch-body{animation:glitch-frame 0.15s ease;}
@keyframes glitch-frame {
  0%  { transform: translateX(0) skewX(0) scaleY(1); filter:none; }
  10% { transform: translateX(-8px) skewX(-2deg) scaleY(1.01); filter:hue-rotate(40deg) brightness(1.4); }
  20% { transform: translateX(10px) skewX(2.5deg); filter:hue-rotate(-20deg); }
  30% { transform: translateX(-6px) skewX(-1deg) scaleY(0.99); filter:brightness(1.6); }
  40% { transform: translateX(8px) skewX(1.5deg); filter:hue-rotate(80deg); }
  50% { transform: translateX(-10px) skewX(-3deg); filter:brightness(0.7); }
  60% { transform: translateX(6px) skewX(2deg) scaleY(1.02); filter:none; }
  70% { transform: translateX(-4px); filter:hue-rotate(30deg) brightness(1.3); }
  80% { transform: translateX(5px) skewX(-1deg); filter:none; }
  90% { transform: translateX(-3px) scaleY(0.99); filter:brightness(1.2); }
  100%{ transform: translateX(0) skewX(0) scaleY(1); filter:none; }
}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>

<div id="cursor"></div>

<div id="menu">
  <div id="menu-title">
    <span class="m-main">MERIDIAN</span>
    <span class="m-sub">SYSTÈME JUDICIAIRE FÉDÉRAL — v7.1.0</span>
    <span class="m-dossier">Dossier AK-2134 — Disparition non résolue</span>
  </div>
  <button id="btn-play">[ Jouer ]</button>
  <span class="menu-loop">boucle : 4 847</span>
</div>

<div id="intro-screen">
  <div style="max-width:620px;text-align:left;">
    <div style="font-size:11px;color:var(--green-dim);letter-spacing:0.25em;margin-bottom:24px;">— NOTE DE BRIEFING —</div>
    <div id="intro-text"></div>
  </div>
  <button id="btn-intro-continue">[ Accéder au terminal ]</button>
</div>

<div id="header" style="display:none">
  <span>MERIDIAN OS v7.1.0 — SYSTÈME JUDICIAIRE FÉDÉRAL</span>
  <span>Agent : <span class="h-agent">Kael Marven</span> — Niveau 4</span>
  <span id="loop-counter">boucle : 4 847</span>
</div>

<div id="terminal" style="display:none"></div>
<div id="commands-bar" style="display:none"></div>

<div id="flashback-overlay">
  <div id="flashback-text"></div>
  <div id="flashback-hint">— appuyez sur espace pour continuer —</div>
</div>

<div id="end-overlay">
  <div id="end-question"></div>
  <div id="end-choices">
    <button class="end-btn" id="btn-oui">[ OUI ]</button>
    <button class="end-btn" id="btn-non">[ NON ]</button>
    <button class="end-btn" id="btn-silence">[ ... ]</button>
  </div>
  <div id="anna-dialogue"></div>
  <div id="end-final"></div>
  <div id="end-continue" style="display:none; font-family:'Share Tech Mono',monospace; font-size:11px; color:#333; letter-spacing:0.25em; margin-top:48px; animation:blink-hint 2s ease infinite;">— appuyez sur une touche pour continuer —</div>
</div>

<canvas id="breach-canvas"></canvas>

<script>
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

const sleep = ms => new Promise(r => setTimeout(r, ms));
const T  = document.getElementById('terminal');
const CB = document.getElementById('commands-bar');

let act = 0;
let busy = false;
let unlockedIndex = 0;
let hintTimer = null;
let dynamicCommands = [];
let ambientAudio = null;
const flashbackSeen = new Set();

// Vitesse de frappe en ms par caractère
const TYPING_SPEED = 14;

function addLine(text, cls='l-resp', delay=0) {
  return new Promise(async resolve => {
    if (delay) await sleep(delay);
    const d = document.createElement('div');
    d.className = 'line ' + cls;
    T.appendChild(d);
    T.scrollTop = T.scrollHeight;

    // Lignes vides ou séparateurs — pas de typage
    if (!text || cls === 'l-blank' || cls === 'l-sep') {
      d.innerHTML = text;
      resolve();
      return;
    }

    // Construire la liste des caractères en ignorant les balises HTML
    // On type le texte brut, puis on set innerHTML d'un coup à la fin
    const plain = text.replace(/<[^>]*>/g, '');

    // Typage lettre par lettre sur le texte brut visible
    // Pour les lignes avec HTML on affiche tout d'un coup après le typage
    let displayed = '';
    for (let i = 0; i < plain.length; i++) {
      displayed += plain[i];
      d.textContent = displayed;
      T.scrollTop = T.scrollHeight;
      // Son à chaque caractère, légèrement aléatoire
      if (plain[i] !== ' ') playKeyClick();
      await sleep(TYPING_SPEED + Math.random() * 12);
    }

    // Remplace par le HTML complet à la fin (pour les spans de couleur etc.)
    d.innerHTML = text;
    T.scrollTop = T.scrollHeight;
    resolve();
  });
}
function blank(d=0){ return addLine('','l-blank',d); }
async function lines(arr, base=50) {
  for (let i=0;i<arr.length;i++) {
    const [t,c='l-resp'] = arr[i];
    await addLine(t, c, i===0 ? 0 : base+Math.random()*30);
  }
}
async function glitch(ms=200) {
  document.body.classList.add('glitch-body');
  playGlitchSound();
  await sleep(ms);
  document.body.classList.remove('glitch-body');
}

// Ordre séquentiel des commandes de base
const BASE_CMDS = [
  ['DOSSIER',               () => cmdDossier()],
  ['PROFIL',                () => cmdProfil()],
  ['LOGS',                  () => cmdLogs()],
  ['TIMELINE',              () => cmdTimeline()],
  ['PREUVES',               () => cmdPreuves()],
  ['DOSSIER LIÉ : MV-2134', () => cmdMV2134()],
  ['RAPPORT MÉDICAL',       () => cmdRapport()],
];

function buildCommands() {
  CB.innerHTML = '';
  const all = [...BASE_CMDS, ...dynamicCommands];
  all.forEach(([label, fn], idx) => {
    const isBase   = idx < BASE_CMDS.length;
    const unlocked = isBase ? idx <= unlockedIndex : true;
    const b = document.createElement('button');
    b.className = 'cmd-btn' + (unlocked ? ' unlocked' : '');
    b.textContent = label;
    b.disabled = !unlocked;
    if (unlocked) {
      b.addEventListener('click', async () => {
        if (busy) return;
        playKeyClick();
        busy = true;
        if (hintTimer) clearTimeout(hintTimer);
        CB.querySelectorAll('.cmd-btn').forEach(x => x.classList.remove('key-step'));
        disableAll();
        await addLine(label, 'l-cmd');
        await blank();
        await fn();
        await blank();
        busy = false;
        buildCommands();
        scheduleHint();
      });
    }
    CB.appendChild(b);
  });
}

function disableAll() {
  CB.querySelectorAll('.cmd-btn').forEach(b => b.disabled = true);
}

function unlockNext() {
  if (unlockedIndex < BASE_CMDS.length - 1) unlockedIndex++;
  buildCommands();
  scheduleHint();
}

function scheduleHint() {
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    if (busy) return;
    let nextLabel = null;
    if (unlockedIndex < BASE_CMDS.length - 1) {
      nextLabel = BASE_CMDS[unlockedIndex + 1]?.[0];
    } else {
      const dyn = dynamicCommands.find(([label]) => {
        const btn = [...CB.querySelectorAll('.cmd-btn')].find(b => b.textContent.trim() === label && !b.disabled);
        return !!btn;
      });
      if (dyn) nextLabel = dyn[0];
    }
    if (!nextLabel) return;
    // Affichage direct sans son de frappe
    const d = document.createElement('div');
    d.className = 'line l-dim';
    d.textContent = `// mise à jour dossier — consulter : ${nextLabel}`;
    T.appendChild(d);
    const b2 = document.createElement('div'); b2.className = 'line l-blank';
    T.appendChild(b2);
    T.scrollTop = T.scrollHeight;
    CB.querySelectorAll('.cmd-btn').forEach(b => {
      if (b.textContent.trim() === nextLabel) b.classList.add('key-step');
    });
  }, 20000);
}

// FLASHBACKS
const FLASHBACKS = [
  `Il faisait beau ce jour-là. Je ne sais pas pourquoi<br>je m'en souviens. C'est le jour où Max est arrivé —<br>il grattait à la porte, trempé. Je l'ai laissé entrer.<br>Il s'est installé comme s'il avait toujours été là.`,
  `Ce soir j'ai commandé à manger. Trop pour une personne.<br>Je mange toujours trop pour une personne.<br>Max a dormi sur mes genoux pendant que je finissais<br>de travailler. Journée ordinaire.<br>Les meilleures le sont.`,
  `Il y a des matins où je me réveille et pendant<br>une fraction de seconde je ne sais plus où je suis.<br>Ça dure une seconde, pas plus.<br>Ensuite tout revient — l'appartement, Max, le travail.<br>Tout est là.<br>Tout a toujours été là.`
];

function showFlashback(index) {
  return new Promise(async resolve => {
    // Ne montrer chaque flashback qu'une seule fois
    if (flashbackSeen.has(index)) { resolve(); return; }
    flashbackSeen.add(index);
    const ov   = document.getElementById('flashback-overlay');
    const tx   = document.getElementById('flashback-text');
    const hint = document.getElementById('flashback-hint');

    // Glitch puis lancer le flashback immédiatement — fondu audio en parallèle
    await glitch(300);

    // Fondu sortant du son — en parallèle, on n'attend pas
    if (ambientAudio) {
      const startVol = ambientAudio.volume;
      const steps = 20;
      let step = 0;
      const fadeOut = setInterval(() => {
        step++;
        ambientAudio.volume = Math.max(0, startVol * (1 - step / steps));
        if (step >= steps) clearInterval(fadeOut);
      }, 80);
    }

    // Lancer le flashback sans attendre le fondu
    ov.classList.add('active');
    tx.innerHTML = FLASHBACKS[index];
    hint.classList.remove('visible');
    tx.classList.remove('visible');
    await sleep(300);
    tx.classList.add('visible');
    await sleep(1400);
    hint.classList.add('visible');

    function onKey(e) {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        document.removeEventListener('keydown', onKey);
        close();
      }
    }
    async function close() {
      tx.classList.remove('visible');
      hint.classList.remove('visible');
      await sleep(700);
      ov.classList.remove('active');
      await sleep(300);
      // Fondu entrant du son — en parallèle
      if (ambientAudio) {
        const targetVol = 0.35;
        const steps = 20;
        let step = 0;
        const fadeIn = setInterval(() => {
          step++;
          ambientAudio.volume = Math.min(targetVol, targetVol * (step / steps));
          if (step >= steps) clearInterval(fadeIn);
        }, 100);
      }
      resolve();
    }
    document.addEventListener('keydown', onKey);
  });
}

// COMMANDES
async function cmdDossier() {
  await lines([
    ['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep'],
    ['DOSSIER AK-2134 — DISPARITION NON RÉSOLUE','l-warn'],
    ['<span class="l-sep">─────────────────────────────────────────────</span>','l-sep'],
  ],30);
  await lines([

// ══ AUDIO ══
let audioCtx = null;
let masterGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 1;
  masterGain.connect(audioCtx.destination);
}

function playKeyClick() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.035, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * 0.25));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = 0.03;
  const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 3200 + Math.random() * 600;
  src.connect(f); f.connect(g); g.connect(masterGain);
  src.start();
}

function playGlitchSound() {
  if (!audioCtx) return;
  const dur = 0.055 + Math.random() * 0.065;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = 0.055;
  const f = audioCtx.createBiquadFilter(); f.type = 'bandpass';
  f.frequency.value = 500 + Math.random() * 1400; f.Q.value = 0.7;
  src.connect(f); f.connect(g); g.connect(masterGain);
  src.start();
}

function fadeOutAudio(seconds) {
  if (!masterGain || !audioCtx) return;
  masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + seconds);
}
function fadeOutRain() {}   // stubs vides — plus utilisés
function fadeInRain()  {}

async function playShutdown() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(120, audioCtx.currentTime);
  osc.frequency.linearRampToValueAtTime(18, audioCtx.currentTime + 5);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.07, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 5);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 300;
  osc.connect(f); f.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 5.5);
}

function playSadMelody() {
  if (!audioCtx) return;
  // Mélodie en La mineur — notes simples, douce et triste
  // Fréquences : La3, Do4, Mi4, Sol4, Fa4, Mi4, Ré4, Do4
  const notes = [
    { f: 220.0, t: 0.0,  d: 1.8 },
    { f: 261.6, t: 1.8,  d: 1.4 },
    { f: 329.6, t: 3.2,  d: 1.2 },
    { f: 392.0, t: 4.4,  d: 1.0 },
    { f: 349.2, t: 5.4,  d: 1.4 },
    { f: 329.6, t: 6.8,  d: 1.2 },
    { f: 293.7, t: 8.0,  d: 1.4 },
    { f: 261.6, t: 9.4,  d: 2.2 },
    { f: 220.0, t: 11.6, d: 2.8 },
  ];

  const masterVol = audioCtx.createGain();
  masterVol.gain.value = 0;
  masterVol.connect(audioCtx.destination);
  // Fade in doux
  masterVol.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 2);
  // Fade out en fin de mélodie
  masterVol.gain.setValueAtTime(0.08, audioCtx.currentTime + 12);
  masterVol.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 16);

  for (const note of notes) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = note.f;

    const env = audioCtx.createGain();
    const start = audioCtx.currentTime + note.t;
    env.gain.setValueAtTime(0, start);
    env.gain.linearRampToValueAtTime(1, start + 0.15);
    env.gain.setValueAtTime(1, start + note.d - 0.3);
    env.gain.linearRampToValueAtTime(0, start + note.d);

    // Légère reverb simulée avec un délai
    const delay = audioCtx.createDelay(0.4);
    delay.delayTime.value = 0.25;
    const delayGain = audioCtx.createGain();
    delayGain.gain.value = 0.25;

    osc.connect(env);
    env.connect(masterVol);
    env.connect(delay);
    delay.connect(delayGain);
    delayGain.connect(masterVol);

    osc.start(start);
    osc.stop(start + note.d + 0.1);
  }
}

    await sleep(80);
    div.classList.add('visible');
  }

  await sleep(3500);
  contHint.style.display = 'block';

  await new Promise(resolve => {
    function onKey(e) {
      document.removeEventListener('keydown', onKey);
      contHint.style.display = 'none';
      resolve();
    }
    document.addEventListener('keydown', onKey);
  });

  await startBreach();
}

// ══ ÉCRAN BRISÉ ══
async function startBreach() {
  const canvas = document.getElementById('breach-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.classList.add('active');
  document.getElementById('end-overlay').style.opacity = '0';

  // Son d'extinction
  playShutdown();
  fadeOutAudio(8);

  const W = canvas.width, H = canvas.height;

  // Quelques glitchs visuels d'intro
  for (let i = 0; i < 5; i++) {
    playGlitchSound();
    await glitch(70 + Math.random() * 90);
    await sleep(120 + Math.random() * 160);
  }

  const cx = W / 2, cy = H / 2;

  // Générer fractures — plus épaisses et visibles
  const cracks = [];
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const len   = W * 0.55 + Math.random() * W * 0.45;
    const segs  = [];
    let x = cx, y = cy, a = angle;
    const segCount = 10 + Math.floor(Math.random() * 5);
    for (let s = 0; s < segCount; s++) {
      a += (Math.random() - 0.5) * 0.35;
      const sl = len / segCount * (0.6 + Math.random() * 0.8);
      const nx = x + Math.cos(a) * sl;
      const ny = y + Math.sin(a) * sl;
      segs.push({ x1:x, y1:y, x2:nx, y2:ny });
      x = nx; y = ny;
    }
    // Fractures secondaires
    const branches = [];
    for (let b = 0; b < 2; b++) {
      const bi = Math.floor(Math.random() * segs.length);
      const ba = angle + (Math.random() - 0.5) * 1.2;
      const bl = len * 0.3;
      branches.push({ x1: segs[bi].x2, y1: segs[bi].y2, x2: segs[bi].x2 + Math.cos(ba)*bl, y2: segs[bi].y2 + Math.sin(ba)*bl });
    }
    cracks.push({ segs, branches, drawn: 0, alpha: 0 });
  }

  // Éclats — plus grands, plus lents
  const shards = [];
  for (let i = 0; i < 55; i++) {
    const r = 20 + Math.random() * 280;
    const a = Math.random() * Math.PI * 2;
    const sx = cx + Math.cos(a) * r, sy = cy + Math.sin(a) * r;
    const pts = [];
    const n = 3 + Math.floor(Math.random() * 4);
    for (let p = 0; p < n; p++) {
      const pa = (p / n) * Math.PI * 2 + Math.random() * 0.6;
      const pr = 25 + Math.random() * 100;
      pts.push({ x: sx + Math.cos(pa)*pr, y: sy + Math.sin(pa)*pr });
    }
    shards.push({
      pts,
      vx: (Math.random()-0.5) * 1.2,
      vy: Math.random() * 1.8 + 0.4,  // gravité douce
      va: (Math.random()-0.5) * 0.03,
      alpha: 0.85,
      fallen: false,
    });
  }

  let phase = 0;
  let crackProgress = 0;
  let shardPhase = 0;
  let blackAlpha = 0;
  let finalTextAlpha = 0;
  let finalTextTimer = 0;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  function drawFrame() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if (phase === 0) {
      // Fractures — progression plus lente
      crackProgress += 0.018;
      let allDone = true;
      for (const crack of cracks) {
        const target = Math.floor(crackProgress * crack.segs.length);
        if (crack.drawn < crack.segs.length) { crack.drawn = Math.min(target, crack.segs.length); allDone = false; }
        crack.alpha = Math.min(crack.alpha + 0.04, 1);

        // Ligne principale
        ctx.strokeStyle = `rgba(200,220,200,${crack.alpha * 0.85})`;
        ctx.lineWidth = 1.4;
        ctx.shadowColor = 'rgba(0,255,65,0.5)';
        ctx.shadowBlur = 5;
        ctx.beginPath();
        crack.segs.slice(0, crack.drawn).forEach((seg, s) => {
          s === 0 ? ctx.moveTo(seg.x1, seg.y1) : ctx.lineTo(seg.x2, seg.y2);
        });
        ctx.stroke();

        // Branches
        if (crack.drawn >= crack.segs.length * 0.5) {
          ctx.lineWidth = 0.6;
          ctx.strokeStyle = `rgba(180,200,180,${crack.alpha * 0.5})`;
          crack.branches.forEach(b => {
            ctx.beginPath(); ctx.moveTo(b.x1, b.y1); ctx.lineTo(b.x2, b.y2); ctx.stroke();
          });
        }
      }
      ctx.shadowBlur = 0;

      // Point d'impact
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 45);
      glow.addColorStop(0, `rgba(0,255,65,${0.8 * Math.min(crackProgress, 1)})`);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(cx-60, cy-60, 120, 120);

      if (allDone && crackProgress > 2.2) phase = 1;

    } else if (phase === 1) {
      // Fractures qui s'estompent
      const fadeF = Math.max(0, 0.8 - shardPhase * 0.8);
      for (const crack of cracks) {
        ctx.strokeStyle = `rgba(200,220,200,${fadeF})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        crack.segs.forEach((seg, s) => { s === 0 ? ctx.moveTo(seg.x1, seg.y1) : ctx.lineTo(seg.x2, seg.y2); });
        ctx.stroke();
      }

      // Éclats tombants — plus lents
      shardPhase += 0.005;
      let active = false;
      for (const shard of shards) {
        if (shard.fallen) continue;
        active = true;
        shard.vy += 0.04; // gravité douce
        shard.pts = shard.pts.map(p => ({ x: p.x + shard.vx, y: p.y + shard.vy }));
        shard.alpha -= 0.003;
        if (shard.alpha <= 0 || shard.pts[0].y > H + 150) { shard.fallen = true; continue; }
        ctx.save();
        ctx.globalAlpha = shard.alpha;
        ctx.strokeStyle = 'rgba(120,200,120,0.7)';
        ctx.fillStyle   = 'rgba(0,30,0,0.35)';
        ctx.lineWidth   = 0.8;
        ctx.shadowColor = 'rgba(0,255,65,0.2)';
        ctx.shadowBlur  = 4;
        ctx.beginPath();
        shard.pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();
      }

      if (!active || shardPhase > 1.2) phase = 2;

    } else if (phase === 2) {
      // Fondu vers le noir
      blackAlpha += 0.008;
      ctx.fillStyle = `rgba(0,0,0,${Math.min(blackAlpha, 1)})`;
      ctx.fillRect(0, 0, W, H);

      // "fin du cauchemar" apparaît puis les infos Kael/Anna
      if (blackAlpha >= 1) {
        finalTextTimer += 0.008;

        // "fin du cauchemar" d'abord
        const fadeIn = Math.min(finalTextTimer * 2, 1);
        ctx.globalAlpha = fadeIn;
        ctx.fillStyle = '#aaaaaa';
        ctx.font = '15px Share Tech Mono, monospace';
        ctx.textAlign = 'center';
        ctx.fillText('— fin du cauchemar —', cx, cy);

        // Puis Kael/Anna en dessous après un délai
        if (finalTextTimer > 1.5) {
          const infoFade = Math.min((finalTextTimer - 1.5) * 1.5, 1);
          ctx.globalAlpha = infoFade;
          ctx.fillStyle = '#cccccc';
          ctx.font = '13px Share Tech Mono, monospace';
          ctx.fillText('KAEL MARVEN  —  disparu depuis 22 ans.', cx, cy + 54);
          ctx.fillText('ANNA MARVEN  —  disparu depuis 23 ans.', cx, cy + 78);
          ctx.globalAlpha = infoFade * 0.65;
          ctx.fillStyle = '#888888';
          ctx.font = '11px Share Tech Mono, monospace';
          ctx.fillText('Premières consciences à se libérer du système MERIDIAN.', cx, cy + 112);
        }

        ctx.globalAlpha = 1;
        if (finalTextTimer > 5) return;
      }
    }

    requestAnimationFrame(drawFrame);
  }

  requestAnimationFrame(drawFrame);
}
